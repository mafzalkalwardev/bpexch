# BPExch — Render.com deployment (API + PostgreSQL)
# Connect repo at https://dashboard.render.com → New Blueprint
services:
  - type: web
    name: bpexch-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: >-
      npm ci &&
      npm run build -w @bpexch/shared &&
      npm run generate -w @bpexch/db &&
      npm run build -w @bpexch/db &&
      cd apps/api && npx tsc -p tsconfig.build.json
    startCommand: node scripts/render-start.js
    healthCheckPath: /api/sports
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bpexch-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: API_PORT
        value: 10000
      - key: CASINO_WEBHOOK_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
    autoDeploy: true

  - type: psql
    name: bpexch-db
    region: singapore
    plan: free
    databaseName: bpexch
    user: bpexch
